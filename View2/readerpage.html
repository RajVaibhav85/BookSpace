<!DOCTYPE html>
<head>
    <title>BookSpace</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Page Variables in root*/
        :root{
            --bg-gradient: linear-gradient(160deg, #000000 0%, #2a0a40 45%, #0b1c3d 100%);
            --bg-card:rgba(255, 255, 255, 0.03);
            --bg-border: 1px solid rgba(255, 255, 255, 0.15);
        }

        html , body{
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            height: 100%;
            overflow: hidden;
        }

        body{
            color: white;
            background: var(--bg-gradient);
            background-repeat: no-repeat;
            min-height: 100vh;
        }

        /* Top-bar CSS */

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: relative;
            top: 0;
            z-index: 1;
        }

        #top-bar p { margin: 0; font-size: 28px; }

        nav { background: transparent; padding: 15px 30px; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: white; font-weight: 500; font-size: 20px; transition: 0.3s; }
        nav a:hover { opacity: 0.7; }

        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 100%; left: 0;
            list-style: none; padding: 10px 0; margin: 0;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: var(--bg-border);
            border-radius: 8px; min-width: 160px; display: none;
        }
        .dropdown-menu li { padding: 8px 15px; }
        .dropdown-menu a { font-size: 16px; display: block; }
        .dropdown:hover .dropdown-menu { display: block; }


        /* Content: wrapper for all things */

        #content {
            overflow-x: hidden;
            overflow-y: auto;
            height:100vh;
        }

#content::-webkit-scrollbar,
.chapter-list::-webkit-scrollbar {
    width: 8px;
    background: transparent;
}

#content::-webkit-scrollbar-track,
.chapter-list::-webkit-scrollbar-track {
    background: transparent;
}

#content::-webkit-scrollbar-thumb,
.chapter-list::-webkit-scrollbar-thumb {
    background-color: rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    border: 2px solid transparent;
    background-clip: padding-box;
}

#content::-webkit-scrollbar-thumb:hover,
.chapter-list::-webkit-scrollbar-thumb:hover {
    background-color: rgba(255, 255, 255, 0.6);
}

        /* MangaPage CSS */

#manga-page {
    width: 90%;
    max-width: 1100px;
    margin: 40px auto;
}

.manga-info {
    display: flex;
    gap: 40px;
    background: var(--bg-card);
    border: var(--bg-border);
    border-radius: 16px;
    padding: 30px;
    backdrop-filter: blur(12px);
}

.cover-section {
    flex-shrink: 0;
}

.cover-image {
    width: 250px;
    border-radius: 12px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.6);
}

.details-section {
    flex: 1;
}

.manga-title {
    margin-top: 0;
    font-size: 32px;
}

.meta {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    margin: 15px 0;
    font-size: 14px;
    color: rgba(255,255,255,0.7);
}

.manga-description {
    line-height: 1.6;
    color: rgba(255,255,255,0.85);
}

.read-btn {
    margin-top: 20px;
    padding: 12px 25px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-size: 16px;
    background: linear-gradient(45deg, #7b2ff7, #f107a3);
    color: white;
    transition: 0.3s;
}

.read-btn:hover {
    opacity: 0.85;
    transform: scale(1.03);
}

.chapters-section {
    margin-top: 40px;
    background: var(--bg-card);
    border: var(--bg-border);
    border-radius: 16px;
    padding: 25px;
}

.chapters-section h2 {
    margin-top: 0;
}

.chapter-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-height: 300px;
    overflow-y: auto;
}

.chapter-item {
    padding: 10px 15px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.05);
    transition: 0.2s;
}

.chapter-item:hover {
    background: rgba(255,255,255,0.12);
}

@media(max-width: 768px){
    #top-bar{
        flex-direction: column;
        gap: 10px;
        align-items: center;
    }
    nav ul{
        flex-wrap: wrap;
        justify-content: center;
    }

    #top-bar p {
        font-size: 20px;
    }
    nav a {
        font-size: 16px;
    }
    .manga-info {
        flex-direction: column;
        align-items: center;
        text-align: center;
    }

    .cover-image {
        width: 200px;
    }

    .meta {
        justify-content: center;
    }
}

.reader-section {
    margin-top: 40px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.reader-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    margin-top: 20px;
}

.reader-controls button {
    padding: 8px 18px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: linear-gradient(45deg, #7b2ff7, #f107a3);
    color: white;
}

.manga-reader {
    width: 100%;
    max-width: 900px;      
    position: relative;
    margin: 0 auto;
}

.manga-images img {
  width: 100%;
  height: auto;
  display: block;
  margin: 0;
}

.manga-reader-btns {
    position: fixed;
    bottom: 30px;
    right: 30px;
    display: none;
    flex-direction: column;
    gap: 12px;
    z-index: 99;
}


.scroll-btn {
    width: 45px;
    height: 45px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    font-size: 18px;
    background: linear-gradient(45deg, #7b2ff7, #f107a3);
    color: white;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    transition: 0.3s;
}

.scroll-btn:hover {
    transform: scale(1.1);
}

    </style>
</head>
<body>
<div id="content">

    <div id="top-bar">
        <div>
            <p><a href="/" style="text-decoration: none; color: white;">BookSpace</a></p>
        </div>
        <nav id="nav-bar">
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/books">Books</a></li>
                <li class="dropdown">
            <a href="#">Genre</a>

            <ul class="dropdown-menu">
                <li><a href="#">Action</a></li>
                <li><a href="#">Romance</a></li>
                <li><a href="#">Fantasy</a></li>
                <li><a href="#">Horror</a></li>
                <li><a href="#">Sci-Fi</a></li>
            </ul>
        </li>

                <li><a href="/about">About</a></li>
                <li><a href="/profile">Profile</a></li>
                <li><a href="/user/logout">Logout</a></li>
            </ul>
        </nav>
    </div>

  <div id="manga-page">

    <div class="manga-info">
        <div class="cover-section">
            <img src="" alt="Manga Cover" class="cover-image" id="cover-img">
        </div>
        <div class="details-section">
            <h1 class="manga-title" id="manga-title">Loading...</h1>
            <div class="meta">
                <span id="manga-genres"></span>
                <span id="manga-status"></span>
                <span id="manga-chapters"></span>
            </div>
            <p class="manga-description" id="manga-desc"></p>
            <button class="read-btn" onclick="loadChapter(1)">Start Reading</button>
        </div>
    </div>

    <div class="chapters-section">
      <h2>Chapters</h2>

      <div class="chapter-list">

      </div>

    </div>
    <div class="reader-section" id="reader" style="display:none;">

        <div class="manga-reader">
            <div class="manga-images">

            </div>
            <div class="manga-reader-btns">
                <button id="scrollTopBtn" class="scroll-btn">⬆</button>
                <button id="bookmarkBtn" class="scroll-btn"><img src="bookmark-icon.png"></button>
                <button id="downloadBtn" class="scroll-btn"><img src="download-icon.png"></button>
                <button id="scrollBottomBtn" class="scroll-btn">⬇</button>
            </div>
        </div>

        <div class="reader-controls">
            <button id="prevChapter">Previous</button>
            <span id="chapterIndicator">Chapter 1</span>
            <button id="nextChapter">Next</button>
        </div>
    </div>


  </div>

</div>

<script>
let currentChapter = 1;
let chapterCount = 0;

const readerSection    = document.getElementById("reader");
const chapterIndicator = document.getElementById("chapterIndicator");
const chapterList      = document.querySelector(".chapter-list");
const mangaImages      = document.querySelector('.manga-images');
const readerBtns       = document.querySelector('.manga-reader-btns');
const content          = document.getElementById("content");
const scrollTopBtn     = document.getElementById("scrollTopBtn");
const scrollBottomBtn  = document.getElementById("scrollBottomBtn");

// ── Get manga ID from URL ─────────────────────────────────────────────────
const params  = new URLSearchParams(window.location.search);
const mangaId = params.get('id');

// ── Fetch manga details from your API ────────────────────────────────────
async function loadMangaDetails() {
    if (!mangaId) return;
    try {
        const res  = await fetch(`/api/${mangaId}`);
        const data = await res.json();

        document.getElementById('cover-img').src          = data.cover || '';
        document.getElementById('cover-img').alt          = data.title;
        document.getElementById('manga-title').textContent = data.title;
        document.getElementById('manga-status').textContent = `Status: ${data.status || 'N/A'}`;
        document.getElementById('manga-genres').textContent = data.tags?.length
            ? `Genre: ${data.tags.slice(0, 3).join(', ')}`
            : '';
        document.getElementById('manga-desc').textContent  = data.description || 'No description available.';

        // Fetch chapter count from MangaDex
        const chapRes  = await fetch(`https://api.mangadex.org/manga/${mangaId}/aggregate?translatedLanguage[]=en`);
        const chapData = await chapRes.json();
        const volumes  = Object.values(chapData.volumes || {});
        chapterCount   = volumes.reduce((sum, v) => sum + Object.keys(v.chapters || {}).length, 0);

        document.getElementById('manga-chapters').textContent = `Chapters: ${chapterCount}`;
        loadChapterList();

    } catch (err) {
        console.error('Failed to load manga details:', err);
    }
}

// ── Fetch chapter images from MangaDex ───────────────────────────────────
async function loadChapter(index) {
    currentChapter = index;
    chapterIndicator.textContent = `Chapter ${index}`;
    readerSection.style.display  = 'block';
    mangaImages.innerHTML        = '<p style="color:white;text-align:center">Loading pages...</p>';

    try {
        // 1. Get chapter list for this manga
        const listRes  = await fetch(
            `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=500`
        );
        const listData = await listRes.json();
        const chapter  = listData.data.find(c => c.attributes.chapter == index);

        if (!chapter) {
            mangaImages.innerHTML = '<p style="color:white;text-align:center">Chapter not found.</p>';
            return;
        }

        // 2. Get page image URLs
        const pagesRes  = await fetch(`https://api.mangadex.org/at-home/server/${chapter.id}`);
        const pagesData = await pagesRes.json();
        const baseUrl   = pagesData.baseUrl;
        const hash      = pagesData.chapter.hash;
        const pages     = pagesData.chapter.data;

        mangaImages.innerHTML = '';
        pages.forEach(page => {
            const img    = document.createElement('img');
            img.src      = `${baseUrl}/data/${hash}/${page}`;
            img.loading  = 'lazy';
            mangaImages.appendChild(img);
        });

        content.scrollTo({ top: 0, behavior: 'smooth' });

    } catch (err) {
        mangaImages.innerHTML = `<p style="color:white;text-align:center">Failed to load chapter.</p>`;
        console.error(err);
    }
}

function loadChapterList() {
    chapterList.innerHTML = '';
    for (let i = chapterCount; i >= 1; i--) {
        const a = document.createElement('a');
        a.href      = '#';
        a.className = 'chapter-item';
        a.textContent = `Chapter ${i}`;
        a.addEventListener('click', (e) => { e.preventDefault(); loadChapter(i); });
        chapterList.appendChild(a);
    }
}

async function downloadChapter() {
    const btn = document.getElementById('downloadBtn');
    const title = document.getElementById('manga-title').textContent.trim();

    // Show loading state
    btn.querySelector('img').src = 'sandclock-icon.png';
    btn.disabled = true;
    btn.style.opacity = '0.5';

    try {
        // 1. Get chapter ID from MangaDex
        const listRes  = await fetch(
            `https://api.mangadex.org/manga/${mangaId}/feed?translatedLanguage[]=en&order[chapter]=asc&limit=500`
        );
        const listData = await listRes.json();
        const chapter  = listData.data.find(c => c.attributes.chapter == currentChapter);

        if (!chapter) { alert('Chapter not found!'); return; }

        // 2. Call your backend to generate PDF
        const res = await fetch(
            `/api/chapter/${chapter.id}/download?title=${encodeURIComponent(title)}`
        );
        if (!res.ok) throw new Error((await res.json()).error || 'Server error');

        // 3. Trigger download
        const blob = await res.blob();
        const a    = document.createElement('a');
        a.href     = URL.createObjectURL(blob);
        a.download = `${title}-Chapter-${currentChapter}.pdf`;
        a.click();
        URL.revokeObjectURL(a.href);

    } catch (err) {
        alert('Download failed: ' + err.message);
    } finally {
        btn.querySelector('img').src = 'download-icon.png';
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

async function bookmarkChapter() {
    const btn = document.getElementById('bookmarkBtn');
    btn.querySelector('img').src = 'sandclock-icon.png';
    btn.disabled = true;
    btn.style.opacity = '0.5';

    try {
        const res = await fetch('/user/setBookmark', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mangaId, chapter: currentChapter })
        });

        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Server error');

        // Show bookmarked icon briefly
        btn.querySelector('img').src = 'bookmarked-icon.png';
        setTimeout(() => {
            btn.querySelector('img').src = 'bookmark-icon.png';
            btn.disabled = false;
            btn.style.opacity = '1';
        }, 2000);

    } catch (err) {
        alert('Bookmark failed: ' + err.message);
        btn.querySelector('img').src = 'bookmark-icon.png';
        btn.disabled = false;
        btn.style.opacity = '1';
    }
}

document.getElementById('bookmarkBtn').addEventListener('click', bookmarkChapter);

document.getElementById('downloadBtn').addEventListener('click', downloadChapter);

document.getElementById("nextChapter").addEventListener("click", () => {
    if (currentChapter < chapterCount) loadChapter(++currentChapter);
});
document.getElementById("prevChapter").addEventListener("click", () => {
    if (currentChapter > 1) loadChapter(--currentChapter);
});

scrollTopBtn.addEventListener("click", () => content.scrollTo({ top: 0, behavior: "smooth" }));
scrollBottomBtn.addEventListener("click", () => content.scrollTo({ top: content.scrollHeight, behavior: "smooth" }));

content.addEventListener("scroll", () => {
    if (readerSection.style.display === "none") return;
    const rect      = mangaImages.getBoundingClientRect();
    const isVisible = rect.top < window.innerHeight && rect.bottom > 0;
    readerBtns.style.display = isVisible ? "flex" : "none";
});

loadMangaDetails();

</script>

</body>
