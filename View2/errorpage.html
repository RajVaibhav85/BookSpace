<!DOCTYPE html>
<head>
    <title>BookSpace — Error</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg-gradient: linear-gradient(160deg, #000000 0%, #2a0a40 45%, #0b1c3d 100%);
            --bg-border: 1px solid rgba(255, 255, 255, 0.15);
        }

        html, body { margin: 0; padding: 0; font-family: Arial, sans-serif; }

        body {
            color: white;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 1;
        }

        #top-bar p { margin: 0; font-size: 28px; }

        nav { background: transparent; padding: 15px 30px; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 20px; }
        nav a { text-decoration: none; color: white; font-weight: 500; font-size: 20px; transition: 0.3s; }
        nav a:hover { opacity: 0.7; }

        .dropdown { position: relative; }
        .dropdown-menu {
            position: absolute; top: 100%; left: 0;
            list-style: none; padding: 10px 0; margin: 0;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: var(--bg-border);
            border-radius: 8px; min-width: 160px; display: none;
        }
        .dropdown-menu li { padding: 8px 15px; }
        .dropdown-menu a { font-size: 16px; display: block; }
        .dropdown:hover .dropdown-menu { display: block; }

        #error-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .error-code {
            font-size: clamp(80px, 20vw, 160px);
            font-weight: 700;
            margin: 0 0 10px;
            color: rgba(255, 255, 255, 0.9);
        }

        .error-title {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 16px;
            color: rgba(255, 255, 255, 0.85);
        }

        .error-message {
            font-size: 16px;
            line-height: 1.7;
            color: rgba(255, 255, 255, 0.55);
            max-width: 480px;
            margin: 0 0 32px;
        }

        .btn-home {
            display: inline-block;
            padding: 11px 28px;
            border-radius: 30px;
            border: var(--bg-border);
            color: white;
            font-size: 15px;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-home:hover { background: rgba(255, 255, 255, 0.07); }

        @media (max-width: 768px) {
            #top-bar { flex-direction: column; gap: 10px; align-items: center; }
            nav ul { flex-wrap: wrap; justify-content: center; }
            #top-bar p { font-size: 20px; }
            nav a { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="top-bar">
        <div>
            <p><a href="/" style="text-decoration:none;color:white;">BookSpace</a></p>
        </div>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/books">Books</a></li>
                <li class="dropdown">
                    <a href="#">Genre</a>
                    <ul class="dropdown-menu">
                        <li><a href="#">Action</a></li>
                        <li><a href="#">Romance</a></li>
                        <li><a href="#">Fantasy</a></li>
                        <li><a href="#">Horror</a></li>
                        <li><a href="#">Sci-Fi</a></li>
                    </ul>
                </li>
                <li><a href="/about">About</a></li>
                <li><a href="/profile">Profile</a></li>
            </ul>
        </nav>
    </div>

    <div id="error-stage">
        <p class="error-code" id="error-code">404</p>
        <p class="error-title" id="error-title">Page Not Found</p>
        <p class="error-message" id="error-message">The page you're looking for has gone missing from our shelves.</p>
        <a href="/" class="btn-home">← Back to Home</a>
    </div>

    <script>
        const ERROR_COPY = {
            400: { title: "Bad Request",           message: "The server couldn't understand your request." },
            401: { title: "Unauthorised",          message: "You need to be signed in to view this page." },
            403: { title: "Forbidden",             message: "You don't have permission to access this resource." },
            404: { title: "Page Not Found",        message: "The page you're looking for has gone missing from our shelves." },
            408: { title: "Request Timeout",       message: "The server took too long to respond. Please try again." },
            429: { title: "Too Many Requests",     message: "You've sent too many requests. Take a short break and try again." },
            500: { title: "Internal Server Error", message: "Something went wrong on our end. We're working on it." },
            502: { title: "Bad Gateway",           message: "Our server received an invalid response. Try again shortly." },
            503: { title: "Service Unavailable",   message: "BookSpace is temporarily down for maintenance." },
            504: { title: "Gateway Timeout",       message: "The upstream server didn't respond in time." },
        };

        (function init() {
            const srv = window.SERVER_ERROR || {};
            const params = new URLSearchParams(window.location.search);

            const code     = parseInt(srv.code    || params.get('code')    || 404, 10);
            const fallback = ERROR_COPY[code] || { title: "Unexpected Error", message: "Something went wrong." };
            const title    = srv.title   || params.get('title')   || fallback.title;
            const message  = srv.message || params.get('message') || fallback.message;

            document.getElementById('error-code').textContent    = code;
            document.getElementById('error-title').textContent   = title;
            document.getElementById('error-message').textContent = message;
            document.title = `BookSpace — ${code} ${title}`;
        })();
    </script>
</body>
